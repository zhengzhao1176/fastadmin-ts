<div class="panel panel-default panel-intro">
  <div class="panel-heading">
    <h3 class="panel-title">{{ pageTitle|default('List') }}</h3>
  </div>
  <div class="panel-body">
    <div id="myTabContent" class="tab-content">
      <div class="tab-pane fade active in" id="one">
        <div class="widget-body no-padding">
          <div id="toolbar" class="toolbar">
            <a href="javascript:;" class="btn btn-success btn-add" title="{{ __('Add') }}" data-url="{{ addUrl|default('') }}"><i class="fa fa-plus"></i> {{ __('Add') }}</a>
            <a href="javascript:;" class="btn btn-success btn-edit disabled" title="{{ __('Edit') }}" data-url="{{ editUrl|default('') }}"><i class="fa fa-pencil"></i> {{ __('Edit') }}</a>
            <a href="javascript:;" class="btn btn-danger btn-del disabled" title="{{ __('Delete') }}" data-url="{{ delUrl|default('') }}" data-confirm="{{ __('Are you sure you want to delete the selected item?') }}"><i class="fa fa-trash"></i> {{ __('Delete') }}</a>
            <a href="javascript:;" class="btn btn-warning btn-disable btn-multi btn-disabled disabled" title="{{ __('Disable') }}" data-url="{{ multiUrl|default('') }}" data-params="status=hidden"><i class="fa fa-ban"></i> {{ __('Disable') }}</a>
            <a href="javascript:;" class="btn btn-success btn-enable btn-multi btn-disabled disabled" title="{{ __('Enable') }}" data-url="{{ multiUrl|default('') }}" data-params="status=normal"><i class="fa fa-check-circle"></i> {{ __('Enable') }}</a>
            {{ importBtn|raw }}
            {{ recyclebinBtn|raw }}
          </div>
          <table id="{{ tableId|default('table') }}"
                 class="table table-striped table-bordered table-hover table-nowrap"
                 data-operate-edit="{{ editUrl|default('') }}"
                 data-operate-del="{{ delUrl|default('') }}"
                 data-url="{{ indexUrl|default('') }}"
                 width="100%">
            {{ theadHtml|raw }}
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{{ tableInitScript|raw }}
{{ extraScripts|raw }}
