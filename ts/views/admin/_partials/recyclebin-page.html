<div class="panel panel-default panel-intro">
  <div class="panel-heading">
    <h3 class="panel-title">{{ pageTitle|default('Recycle Bin') }}</h3>
  </div>
  <div class="panel-body">
    <div id="myTabContent" class="tab-content">
      <div class="tab-pane fade active in" id="one">
        <div class="widget-body no-padding">
          <div id="toolbar" class="toolbar">
            <a href="javascript:;" class="btn btn-success btn-restoreall" title="{{ __('Restore all') }}" data-url="{{ restoreUrl|default('') }}"><i class="fa fa-rotate-left"></i> {{ __('Restore all') }}</a>
            <a href="javascript:;" class="btn btn-danger btn-destroyall" title="{{ __('Destroy all') }}" data-url="{{ destroyUrl|default('') }}"><i class="fa fa-times"></i> {{ __('Destroy all') }}</a>
          </div>
          <table id="{{ tableId|default('table') }}"
                 class="table table-striped table-bordered table-hover table-nowrap"
                 data-url="{{ recyclebinUrl|default('') }}"
                 width="100%">
            {{ theadHtml|raw }}
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{{ recyclebinInitScript|raw }}
