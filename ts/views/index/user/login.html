<div class="row" style="margin-top: 60px;">
  <div class="col-md-4 col-md-offset-4">
    <div class="panel panel-default">
      <div class="panel-heading"><h3 class="panel-title">{{ title|default('Login') }}</h3></div>
      <div class="panel-body">
        <form method="POST" action="/index/user/login">
          <input type="hidden" name="__token__" value="{{ __token__ }}">
          <div class="form-group">
            <label>账号</label>
            <input type="text" class="form-control" name="account" placeholder="用户名 / 邮箱 / 手机号">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" class="form-control" name="password" placeholder="密码">
          </div>
          <div class="checkbox">
            <label><input type="checkbox" name="keeplogin" value="1"> 保持登录</label>
          </div>
          <button type="submit" class="btn btn-primary btn-block">登录</button>
          <p class="text-center" style="margin-top: 10px;"><a href="/index/user/register">还没注册?</a></p>
        </form>
      </div>
    </div>
  </div>
</div>
