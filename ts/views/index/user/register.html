<div class="row" style="margin-top: 60px;">
  <div class="col-md-4 col-md-offset-4">
    <div class="panel panel-default">
      <div class="panel-heading"><h3 class="panel-title">{{ title|default('Register') }}</h3></div>
      <div class="panel-body">
        <form method="POST" action="/index/user/register">
          <input type="hidden" name="__token__" value="{{ __token__ }}">
          <div class="form-group"><label>用户名</label><input class="form-control" type="text" name="username"></div>
          <div class="form-group"><label>密码</label><input class="form-control" type="password" name="password"></div>
          <div class="form-group"><label>邮箱</label><input class="form-control" type="email" name="email"></div>
          <div class="form-group"><label>手机号</label><input class="form-control" type="text" name="mobile"></div>
          <button type="submit" class="btn btn-primary btn-block">注册</button>
          <p class="text-center" style="margin-top: 10px;"><a href="/index/user/login">已有账号?</a></p>
        </form>
      </div>
    </div>
  </div>
</div>
