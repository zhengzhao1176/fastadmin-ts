<h2>修改密码</h2>
<form class="form-horizontal" method="POST" action="/index/user/changepwd">
  <input type="hidden" name="__token__" value="{{ __token__ }}">
  <div class="form-group"><label class="col-sm-2 control-label">原密码</label><div class="col-sm-6"><input class="form-control" type="password" name="oldpassword"></div></div>
  <div class="form-group"><label class="col-sm-2 control-label">新密码</label><div class="col-sm-6"><input class="form-control" type="password" name="newpassword"></div></div>
  <div class="form-group"><label class="col-sm-2 control-label">确认密码</label><div class="col-sm-6"><input class="form-control" type="password" name="renewpassword"></div></div>
  <div class="form-group"><div class="col-sm-offset-2 col-sm-6"><button type="submit" class="btn btn-primary">修改</button></div></div>
</form>
