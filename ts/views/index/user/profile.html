<h2>个人资料</h2>
<p>当前用户: <strong>{{ username }}</strong></p>
<form class="form-horizontal" method="POST" action="/index/user/profile">
  <input type="hidden" name="__token__" value="{{ __token__ }}">
  <div class="form-group"><label class="col-sm-2 control-label">昵称</label><div class="col-sm-6"><input class="form-control" type="text" name="nickname"></div></div>
  <div class="form-group"><label class="col-sm-2 control-label">邮箱</label><div class="col-sm-6"><input class="form-control" type="email" name="email"></div></div>
  <div class="form-group"><div class="col-sm-offset-2 col-sm-6"><button type="submit" class="btn btn-primary">保存</button></div></div>
</form>
